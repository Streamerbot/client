name: Deploy docs to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - apps/docs/**

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest

    env:
      NUXT_HOST: 0.0.0.0
      NUXT_PUBLIC_SITE_URL: "https://streamerbot.github.io/client"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - uses: actions/cache@v5
        name: Cache compiled nuxt output
        with:
          path: |
            .nuxt
            .output
          key: ${{ runner.os }}-nuxt

      - name: Build @streamerbot/client
        run: pnpm --filter @streamerbot/client build

      - name: Build @streamerbot/vue
        run: pnpm --filter @streamerbot/vue build

      - name: Build
        run: pnpm --filter @streamerbot/client-docs generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/docs/.output/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
